name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gsp
          POSTGRES_PASSWORD: gsp
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gsp -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: dev
      GSP_DATABASE_URL: postgresql+psycopg://gsp:gsp@localhost:5432/gsp_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libgl1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx ruff
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          # strict linting using config from pyproject.toml
          ruff check .

      - name: Security Scans (pip-audit + bandit)
        run: |
          python -m pip install --upgrade pip-audit bandit
          pip-audit -l
          bandit -r app -ll

      - name: Run tests with coverage
        env:
          PYTHONPATH: .
        run: pytest -m "not media_export" --cov=app --cov-report=term --cov-report=xml

      - name: Run real media export gate
        env:
          GSP_MOCK_EXTERNAL_SERVICES: '1'
          GSP_EXTERNAL_PROVIDER_MONTHLY_BUDGET_USD: '0'
          GSP_EXTERNAL_PROVIDER_PER_REQUEST_BUDGET_USD: '0'
        run: pytest -o addopts='' -m media_export tests/test_real_media_exports.py

      - name: Coverage Summary
        run: |
          echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pytest -m "not media_export" --cov=app --cov-report=term-missing --cov-fail-under=60 2>&1 | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security Scan (npm audit)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Unit Tests with Coverage
        run: npm test -- --coverage --watchAll=false --coverageReporters=text --coverageReporters=lcov

      - name: Coverage Summary
        run: |
          echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm test -- --coverage --watchAll=false --coverageReporters=text 2>&1 | grep -A 50 "^-" | head -30 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run E2E Tests
        env:
          CI: 'true'
        run: npm run e2e

  java-spring-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Run Java/Spring tests
        run: python3 .codex/scripts/run_java_gate.py ./mvnw -B test
