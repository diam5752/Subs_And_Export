name: Temporary Enriched Diavgeia Hunter

on:
  push:
    branches:
      - tmp/diavgeia-enriched-hunter-20260714
    paths:
      - tmp_tools/run_enriched_diavgeia_hunter.py
      - .github/workflows/tmp-enriched-diavgeia-hunter.yml

permissions:
  contents: write

concurrency:
  group: tmp-enriched-diavgeia-hunter-20260714
  cancel-in-progress: true

jobs:
  hunt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/diavgeia-enriched-hunter-20260714
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          pip install requests
      - name: Run bounded official-source hunter
        run: |
          rm -rf enriched-hunter-output
          python tmp_tools/run_enriched_diavgeia_hunter.py
          test -s enriched-hunter-output/result.json
      - name: Commit compact results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add enriched-hunter-output
          if git diff --cached --quiet; then
            echo 'No output produced'
            exit 1
          fi
          git commit -m 'chore(tmp): record enriched Diavgeia hunter results'
          git push origin HEAD:tmp/diavgeia-enriched-hunter-20260714
