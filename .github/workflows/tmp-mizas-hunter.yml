name: Temporary MIZAS Hunter

on:
  push:
    branches:
      - tmp/mizas-hunter-20260713-v2
    paths:
      - tmp_tools/mizas_hunter_v6.py.gz.b64
      - .github/workflows/tmp-mizas-hunter.yml
  pull_request:
    branches:
      - master
    paths:
      - tmp_tools/mizas_hunter_v6.py.gz.b64
      - .github/workflows/tmp-mizas-hunter.yml

permissions:
  contents: write

concurrency:
  group: tmp-mizas-hunter-20260713-v2
  cancel-in-progress: true

jobs:
  hunter:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/mizas-hunter-20260713-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          pip install pandas requests pypdf
      - name: Decode scanner and patch inherited Python 3.11 syntax
        run: |
          base64 -d tmp_tools/mizas_hunter_v6.py.gz.b64 | gzip -dc > tmp_tools/mizas_hunter_v6.py
          python - <<'PY'
          from pathlib import Path
          path = Path('tmp_tools/diavgeia_blind_scan_v4.py')
          text = path.read_text(encoding='utf-8')
          old = '''return {f"CONTRACT:{re.sub(r'\\s+', '', value)}" for value in CONTRACT_REF_RE.findall(norm(text))}'''
          new = '''return {"CONTRACT:" + re.sub(r"\\s+", "", value) for value in CONTRACT_REF_RE.findall(norm(text))}'''
          if old not in text:
              raise SystemExit('Expected inherited f-string syntax was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python -m py_compile tmp_tools/diavgeia_blind_scan_v4.py tmp_tools/mizas_hunter_v6.py
      - name: Execute adaptive live Diavgeia hunter and capture diagnostics
        run: |
          rm -rf hunter-output-v6
          mkdir -p hunter-output-v6
          set +e
          python tmp_tools/mizas_hunter_v6.py --out-dir hunter-output-v6 > hunter-output-v6/action.log 2>&1
          status=$?
          set -e
          printf '{"exit_code":%s}\n' "$status" > hunter-output-v6/action_status.json
          cat hunter-output-v6/action.log
      - name: Commit reproducible result or failure diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hunter-output-v6
          if git diff --cached --quiet; then
            echo "No hunter output produced"
            exit 1
          fi
          git commit -m "chore(tmp): record MIZAS Hunter result or diagnostics"
          git push origin HEAD:tmp/mizas-hunter-20260713-v2
