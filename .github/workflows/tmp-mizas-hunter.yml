name: Temporary Adaptive MIZAS Hunter

on:
  push:
    branches:
      - tmp/mizas-hunter-20260713
    paths:
      - .github/workflows/tmp-mizas-hunter.yml
      - tmp_tools/mizas_hunter.py.part*

permissions:
  contents: write

concurrency:
  group: tmp-mizas-hunter-20260713
  cancel-in-progress: true

jobs:
  hunter:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/mizas-hunter-20260713
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Persist start marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf hunter-debug hunter-output
          mkdir -p hunter-debug
          printf '{"status":"started","run_id":"%s","head_sha":"%s","started_at":"%s"}\n' \
            "$GITHUB_RUN_ID" "$GITHUB_SHA" "$(date -u +%FT%TZ)" > hunter-debug/started.json
          git add -f hunter-debug/started.json
          git commit -m "chore(tmp): mark adaptive MIZAS Hunter started"
          git push origin HEAD:tmp/mizas-hunter-20260713
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --upgrade pip
          pip install requests pypdf
      - name: Assemble and execute with durable diagnostics
        run: |
          set +e
          cat \
            tmp_tools/mizas_hunter.py.part01 \
            tmp_tools/mizas_hunter.py.part02 \
            tmp_tools/mizas_hunter.py.part03 \
            tmp_tools/mizas_hunter.py.part04a \
            tmp_tools/mizas_hunter.py.part04b \
            tmp_tools/mizas_hunter.py.part05 \
            tmp_tools/mizas_hunter.py.part05x \
            tmp_tools/mizas_hunter.py.part06 \
            > tmp_tools/mizas_hunter.py
          python -m py_compile tmp_tools/mizas_hunter.py > hunter-debug/compile.log 2>&1
          compile_status=$?
          echo "$compile_status" > hunter-debug/compile_status.txt
          if [ "$compile_status" -eq 0 ]; then
            python tmp_tools/mizas_hunter.py --out-dir hunter-output > hunter-debug/run.log 2>&1
            run_status=$?
          else
            run_status=99
          fi
          echo "$run_status" > hunter-debug/run_status.txt
          printf '{"compile_status":%s,"run_status":%s}\n' "$compile_status" "$run_status" > hunter-debug/status.json
          exit 0
      - name: Upload result and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mizas-hunter-result-${{ github.run_id }}
          path: |
            hunter-output
            hunter-debug
          if-no-files-found: error
          retention-days: 1
      - name: Best-effort commit of compact result
        continue-on-error: true
        run: |
          git add -f hunter-output hunter-debug || true
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(tmp): record adaptive MIZAS Hunter execution"
          git push origin HEAD:tmp/mizas-hunter-20260713 || true
