name: Temporary Extract Selected Case Facts

on:
  push:
    branches:
      - tmp/diavgeia-neighborhood-expansion-20260714
    paths:
      - tmp_tools/extract_selected_case_facts.py
      - .github/workflows/tmp-extract-selected-case-facts.yml
  pull_request:
    branches:
      - master
    paths:
      - tmp_tools/extract_selected_case_facts.py
      - .github/workflows/tmp-extract-selected-case-facts.yml

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/diavgeia-neighborhood-expansion-20260714
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Extract selected official facts
        run: |
          rm -rf selected-case-facts
          python tmp_tools/extract_selected_case_facts.py
      - name: Commit compact facts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add selected-case-facts
          if git diff --cached --quiet; then
            echo "No selected facts produced"
            exit 1
          fi
          git commit -m "chore(tmp): record selected official case facts"
          git push origin HEAD:tmp/diavgeia-neighborhood-expansion-20260714
