name: Temporary MIZAS Hunter Probe

on:
  push:
    branches:
      - tmp/mizas-hunter-20260713
    paths:
      - tmp_tools/mizas_hunter_probe.py

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/mizas-hunter-20260713
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python tmp_tools/mizas_hunter_probe.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hunter-probe
          git commit -m "chore(tmp): record MIZAS hunter probe" || exit 0
          git push origin HEAD:tmp/mizas-hunter-20260713
