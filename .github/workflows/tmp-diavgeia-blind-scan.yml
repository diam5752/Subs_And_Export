name: Temporary Diavgeia Blind Scan

on:
  push:
    branches:
      - tmp/diavgeia-blind-scan-20260713
    paths:
      - .github/workflows/tmp-diavgeia-blind-scan.yml
      - tmp_tools/diavgeia_blind_scan_v2.py

permissions:
  contents: write

concurrency:
  group: tmp-diavgeia-blind-scan-20260713
  cancel-in-progress: true

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/diavgeia-blind-scan-20260713
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pypdf
      - name: Execute two independent scans with explicit-chain validation
        run: |
          rm -rf scan-output
          python tmp_tools/diavgeia_blind_scan_v2.py --out-dir scan-output
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scan-output
          if git diff --cached --quiet; then
            echo "No scan output produced"
            exit 1
          fi
          git commit -m "chore(tmp): record corrected Diavgeia blind scan results"
          git push origin HEAD:tmp/diavgeia-blind-scan-20260713
