name: Temporary Diavgeia blind scan

on:
  push:
    branches:
      - tmp/diavgeia-blind-scan-20260713
    paths:
      - .github/workflows/tmp-diavgeia-blind-scan.yml
      - tmp_tools/diavgeia_blind_scan.py
      - tmp_tools/diavgeia_blind_scan_v6.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out temporary branch
        uses: actions/checkout@v4
        with:
          ref: tmp/diavgeia-blind-scan-20260713
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install scanner dependencies
        run: python -m pip install --disable-pip-version-check pandas requests pypdf

      - name: Run two chain-aware blind scans
        run: python tmp_tools/diavgeia_blind_scan_v6.py --out-dir scan-output

      - name: Persist only results and diagnostics
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scan-output/scan_results.json scan-output/manifest.json scan-output/scan_report.md
          if git diff --cached --quiet; then
            echo 'No output changes.'
          else
            git commit -m 'chore(tmp): record corrected Diavgeia blind scan v6'
            git push origin HEAD:tmp/diavgeia-blind-scan-20260713
          fi
