# Deployment defaults for the FastAPI + Next.js stack
[ai]
# Mock mode keeps every AI provider call local and deterministic.
mock_external_services = true
# Toggle social copy generation by default in the UI/back-end.
enable_by_default = false
model = "mock-social-v1"
temperature = 0.6

[uploads]
# Cap upload size (MB) for video ingestion
max_upload_mb = 1024
